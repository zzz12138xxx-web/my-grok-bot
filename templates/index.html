<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok Studio</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#212121;color:white;font-family:Segoe UI,sans-serif;height:100vh;overflow:hidden;}
.app{display:flex;height:100vh;}

/* Sidebar */
.sidebar{width:260px;background:#171717;border-right:1px solid #2f2f2f;display:flex;flex-direction:column;}
.logo{padding:20px;font-size:18px;font-weight:bold;}
#newChat{margin:10px;padding:12px;border:none;border-radius:8px;background:#2f2f2f;color:white;cursor:pointer;}
#newChat:hover{background:#3a3a3a;}
#history{flex:1;overflow-y:auto;padding:10px;}
.history-item{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:5px;}
.history-item:hover{background:#2f2f2f;}

/* Main */
.main{flex:1;display:flex;flex-direction:column;height:100vh;}
#messages{flex:1;overflow-y:auto;padding:30px;}

/* Welcome */
.welcome{text-align:center;margin-top:20vh;}
.welcome h1{font-size:42px;margin-bottom:10px;}
.welcome p{color:#aaa;}

/* Messages */
.row{display:flex;margin-bottom:20px;}
.user{justify-content:flex-end;}
.ai{justify-content:flex-start;}
.bubble{max-width:80%;padding:14px 18px;border-radius:14px;line-height:1.7;word-break:break-word;position:relative;}
.user .bubble{background:#303030;}
.ai .bubble{background:#2a2a2a;}
.bubble pre{overflow:auto;border-radius:8px;}

/* Input */
.input-container{padding:20px;border-top:1px solid #2f2f2f;}
.input-wrapper{max-width:900px;margin:auto;display:flex;gap:10px;}
#question{flex:1;resize:none;min-height:55px;max-height:200px;border:none;outline:none;background:#2f2f2f;color:white;border-radius:20px;padding:15px;font-size:16px;}
#question:focus{box-shadow:0 0 5px #4f8dfd;}
button.send-btn{border:none;padding:0 20px;border-radius:20px;background:#4f8dfd;color:white;cursor:pointer;font-size:16px;}
button.send-btn:disabled{opacity:0.5;cursor:not-allowed;}
</style>
</head>

<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo">⚡ Grok Studio</div>
        <button id="newChat">+ New Chat</button>
        <div id="history"></div>
    </aside>

    <main class="main">
        <div id="messages">
            <div class="welcome">
                <h1>Grok Studio</h1>
                <p>今天有什么可以帮你？</p>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="question" placeholder="输入消息..."></textarea>
                <button class="send-btn" id="sendBtn">↑</button>
            </div>
        </div>
    </main>
</div>

<script>
// XSS防护
function escapeHtml(str){
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Helpers
function now(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

// Scroll to bottom
function scrollToBottom(){messages.scrollTop = messages.scrollHeight;}

const messages = document.getElementById("messages");
const question = document.getElementById("question");
const sendBtn = document.getElementById("sendBtn");
const historyEl = document.getElementById("history");
let sending=false;

// Send function
async function send(){
    if(sending) return;
    const text = question.value.trim();
    if(!text) return;

    sending=true;
    sendBtn.disabled=true;

    // Add user message
    messages.innerHTML+=`<div class="row user"><div class="bubble">${escapeHtml(text)}<div class="time">${now()}</div></div></div>`;
    scrollToBottom();
    question.value="";

    // Add typing
    const typingEl = document.createElement("div");
    typingEl.className="row ai";
    typingEl.innerHTML='<div class="bubble">正在输入...</div>';
    messages.appendChild(typingEl);
    scrollToBottom();

    try{
        const response = await fetch("/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({message:text})
        });
        const data = await response.json();

        typingEl.remove();

        // Render Markdown
        const html = marked.parse(data.reply);
        messages.innerHTML+=`<div class="row ai"><div class="bubble">${html}<div class="time">${now()}</div></div></div>`;
        hljs.highlightAll();
        scrollToBottom();

        // Save to local history
        addToHistory(text,data.reply);

    }catch(err){
        typingEl.remove();
        messages.innerHTML+=`<div class="row ai"><div class="bubble">服务异常，请稍后重试<div class="time">${now()}</div></div></div>`;
        scrollToBottom();
    }finally{
        sending=false;
        sendBtn.disabled=false;
    }
}

// Enter发送，Shift+Enter换行
question.addEventListener("keydown", e=>{
    if(e.key==="Enter" && !e.shiftKey){
        e.preventDefault();
        send();
    }
});

// 点击按钮发送
sendBtn.addEventListener("click",send);

// 历史管理
function addToHistory(user,ai){
    const item = document.createElement("div");
    item.className="history-item";
    item.innerText=user.length>20?user.slice(0,20)+"...":user;
    item.onclick=()=>{question.value=user;send();};
    historyEl.appendChild(item);
}

// 新建聊天
document.getElementById("newChat").addEventListener("click",()=>{
    messages.innerHTML=`<div class="welcome"><h1>Grok Studio</h1><p>今天有什么可以帮你？</p></div>`;
    question.value="";
    historyEl.innerHTML="";
});

</script>
</body>
</html>
